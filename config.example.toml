[[servers]]
id = "workbox"
url = "ws://100.x.y.z:8788"          # server's Tailscale IP (WireGuard-encrypted)
token_env = "HERDECK_WORKBOX_TOKEN"   # token comes from this env var

[deck]
# Physical layout hint; the real button count comes from the deck driver
# (the Ulanzi D200 exposes 13 buttons). Only used as a fallback (e.g. fake deck).
grid = "5x3"
overview_order = ["workbox"]

# Out-of-band alerts so you don't have to watch the deck. macOS only
# (uses osascript notifications). Omit this section to disable entirely.
[notifications]
enabled = false        # set true to be notified when an agent needs you
on = ["blocked"]       # transitions to alert on (currently only "blocked")
sound = true           # play a sound with the notification

# Answer profiles: keystroke sequences herdeck sends to an agent's pane for the
# Approve / Deny / Stop actions (approve_always = approve and don't ask again).
# Keys are sent in order; "enter" submits, "esc"/"ctrl+c" are literal keys.
#
# Verified against live prompts: claude, codex. The built-in defaults for these
# match the sections below, so you only need a section here to OVERRIDE them.
#
# NOT yet verified: cursor, gemini. No answer profile ships for them — confirm
# the real keystrokes against a live prompt before relying on auto-answers, then
# add an [answer_profiles.<agent>] section (same shape as below) to enable them.
#
# The "default" profile is the fallback for any agent type without its own.
[answer_profiles.claude]
approve = ["1", "enter"]
approve_always = ["2", "enter"]
deny = ["esc"]
stop = ["ctrl+c"]

[answer_profiles.codex]
approve = ["y", "enter"]
deny = ["n", "enter"]
stop = ["ctrl+c"]

[answer_profiles.default]
approve = ["enter"]
deny = ["esc"]
stop = ["ctrl+c"]

# Quick-send macros (shown when drilling into a non-blocked agent).
# Omit this section to use the built-in defaults (continue / run tests / commit / /compact).
[[macros]]
label = "continue"
text = "continue"
[[macros]]
label = "run tests"
text = "run the tests"
[[macros]]
label = "commit"
text = "commit the changes"
[[macros]]
label = "/compact"
text = "/compact"

# Agent types startable from the deck's "+ New" tile -> the argv herdr runs.
# Omit to use defaults. Started in the focused herdr workspace.
[start_profiles]
claude = ["claude"]
codex = ["codex"]
cursor = ["cursor-agent"]
gemini = ["gemini"]
opencode = ["opencode"]
