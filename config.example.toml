active_profile = "work"

[[servers]]
id = "workbox"
url = "ws://100.x.y.z:8788"        # server Tailscale IP (WireGuard-encrypted)
token_env = "HERDECK_WORKBOX_TOKEN" # token comes from this env var, never this file

# ---------------------------------------------------------------------------
# Base configuration — applies to all profiles (the "default" base)
# ---------------------------------------------------------------------------

[deck]
grid = "5x3"

[theme.colors]
working = "green"
idle = "blue"
blocked = "amber"
done = "cyan"
waiting = "violet"   # pane held pending background work (herdwatch: CI, review)
unknown = "grey"
offline = "red"

[view]
management = "launcher_menu"
show_profile_on_panel = true
agent_slots = "max"
tile_fields = ["repo", "branch", "status", "time", "server"]
# Optional text-line tokens: repo, branch, workspace, tab, agent, source,
# work_item, run. Work tokens are empty unless an orchestrator publishes the
# corresponding Herdr state_labels.
# tile_primary = ["work_item", "repo"]
# tile_secondary = ["branch", "run"]
# Language of rendered deck text (tiles/panel/websim) AND the desktop app UI.
# "en" (default) or "cs".
language = "en"

[notifications]
enabled = false
backends = ["macos"]
on = ["blocked"]
sound = true

[safety]
approve_always = true
# Stop (act_force) needs a second confirming press by default — it is an
# unconditional interrupt one key away from Back. Set to [] to opt out.
require_confirm_for = ["act_force"]

# Provider subscription limits on the status panel. Codex uses its documented
# app-server account API. Claude reads the snapshot written by
# `herdeck-usage capture-claude` from a Claude Code status-line command.
# CodexBar is used only as a compatibility fallback. Empty providers = off.
[usage]
providers = []                # e.g. ["claude", "codex"]
paid_only = false             # true = show only natively confirmed paid plans
refresh_secs = 300            # poll cadence (min 30)
codex_path = "codex"
claude_cache_path = "~/.cache/herdeck/claude-usage.json"
codexbar_path = "codexbar"    # empty string disables the fallback

[[macros]]
label = "continue"
text = "continue"

[[macros]]
label = "run tests"
text = "run the tests"

[[macros]]
label = "commit"
text = "commit the changes"

[[macros]]
label = "/compact"
text = "/compact"

[start_profiles]
claude = ["claude"]
codex = ["codex"]
cursor = ["cursor-agent"]
gemini = ["gemini"]
opencode = ["opencode"]

# ---------------------------------------------------------------------------
# Profiles — each section overlays the base above (tables merge, scalars replace)
# ---------------------------------------------------------------------------

[profiles.base]
servers = ["workbox"]

[profiles.work]
extends = "base"

[profiles.mobile]
extends = "work"

[profiles.mobile.view]
management = "bottom_row"
bottom_row = ["profiles", "new_agent"]
show_profile_on_panel = true
agent_slots = "max"
tile_fields = ["repo", "branch", "status", "time", "server"]

[profiles.mobile.notifications]
enabled = false
backends = ["telegram"]
on = ["blocked"]
sound = false

# Telegram backend: export the bot token, never paste it here.
[profiles.mobile.notifications.telegram]
token_env = "HERDECK_TELEGRAM_TOKEN"
chat_id = "123456789"
# Optional Hermes/forum topic and interactive controls.
# message_thread_id = 456
# In a profile overlay, message_thread_id = 0 explicitly selects the main chat.
interactive = false
allowed_user_ids = []
prompt_max_chars = 1200
