name: release
permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build-linux:
    name: Build Linux ${{ matrix.arch }} (AppImage + deb + rpm)
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubicloud-standard-4-ubuntu-2404
          - arch: arm64
            runner: ubicloud-standard-4-arm-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify release version
        run: |
          python scripts/set-version.py --check
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            test "$GITHUB_REF_NAME" = "v$(cat VERSION)"
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            build-essential \
            file \
            desktop-file-utils

      - name: Freeze + smoke the sidecar (Linux ${{ matrix.arch }})
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[packaging]"
          bash desktop/scripts/build-sidecar.sh
          bash desktop/scripts/smoke-sidecar.sh

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ matrix.arch }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.arch }}-cargo-

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      - name: Remove any stale bundle output (warm cache may restore old bundles)
        run: rm -rf desktop/src-tauri/target/release/bundle

      - name: Build Tauri bundles
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Ubicloud runners are full VMs (FUSE works), but keep EXTRACT_AND_RUN
          # as a belt-and-suspenders fallback. NO_STRIP avoids a common silent
          # linuxdeploy strip failure. --verbose surfaces linuxdeploy errors.
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "true"
        run: |
          # AppImage's linuxdeploy scans the bundled PyInstaller sidecar and tries
          # to resolve its vendored libs (auditwheel-hashed names like
          # libwebp-<hash>.so) — but after linuxdeploy copies a Pillow .so out of
          # the bundle, its $ORIGIN runpath no longer points at the sibling vendored
          # lib, so resolution fails. Expose every dir that holds a bundled .so via
          # LD_LIBRARY_PATH so linuxdeploy can find and deploy them.
          SIDE="$GITHUB_WORKSPACE/desktop/src-tauri/resources/herdeck-deckapp"
          EXTRA="$(find "$SIDE" -name '*.so*' -printf '%h\n' | sort -u | paste -sd: -)"
          export LD_LIBRARY_PATH="${EXTRA}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
          npm run tauri -- build --verbose

      - name: Verify all three Linux bundle formats were produced
        working-directory: desktop/src-tauri/target/release/bundle
        run: |
          set -euo pipefail
          shopt -s nullglob
          fail=0
          for kind in "appimage/*.AppImage" "deb/*.deb" "rpm/*.rpm"; do
            files=( $kind )
            if [ ${#files[@]} -eq 0 ]; then
              echo "FAIL: no file matched $kind"; fail=1
            else
              echo "OK: $kind -> ${files[*]}"
            fi
          done
          [ "$fail" -eq 0 ] || { echo "Missing one or more bundle formats"; exit 1; }

      - name: Inspect rpm runtime Requires (diagnostic — appindicator best-effort)
        working-directory: desktop/src-tauri/target/release/bundle/rpm
        run: |
          shopt -s nullglob
          for f in *.rpm; do
            echo "=== Requires of $f ==="
            rpm -qpR "$f"
          done

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v4
        with:
          name: herdeck-linux-${{ matrix.arch }}
          path: |
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage*
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

  build-macos:
    name: Build macOS arm64 (signed app + updater)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify release version
        run: |
          python scripts/set-version.py --check
          test "$GITHUB_REF_NAME" = "v$(cat VERSION)"

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychain -d user -s build.keychain
          security find-identity -v -p codesigning build.keychain |
            grep -F "Developer ID Application: Filip Václavík (96CM57BHVD)"
          rm certificate.p12

      - name: Freeze + smoke the bundled sidecar
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[packaging]"
          bash desktop/scripts/build-sidecar.sh
          bash desktop/scripts/smoke-sidecar.sh

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build, sign, and attach macOS updater artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Filip Václavík (96CM57BHVD)"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: Herdeck ${{ github.ref_name }}
          releaseBody: Signed arm64 macOS application and Linux packages.
          releaseDraft: true
          prerelease: false
          args: --bundles app,dmg

      - name: Preserve macOS updater archive for the unified manifest
        uses: actions/upload-artifact@v4
        with:
          name: herdeck-macos
          path: desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: herdeck-*
          path: dist

      - name: Build unified signed updater manifest
        run: |
          python scripts/generate-update-manifest.py \
            --artifacts dist \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$GITHUB_REF_NAME" \
            --output dist/latest.json

      - name: Publish immutable tag release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            dist/herdeck-linux-x86_64/appimage/* \
            dist/herdeck-linux-x86_64/deb/* \
            dist/herdeck-linux-x86_64/rpm/* \
            dist/herdeck-linux-arm64/appimage/* \
            dist/herdeck-linux-arm64/deb/* \
            dist/herdeck-linux-arm64/rpm/* \
            dist/herdeck-macos/* \
            dist/latest.json \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
          gh release edit "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false
