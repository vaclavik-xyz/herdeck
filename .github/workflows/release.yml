name: release
permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build-linux:
    name: Build Linux ${{ matrix.arch }} (AppImage + deb + rpm)
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubicloud-standard-4-ubuntu-2404
          - arch: arm64
            runner: ubicloud-standard-4-arm-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            build-essential \
            file \
            desktop-file-utils

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Freeze + smoke the sidecar (Linux ${{ matrix.arch }})
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[packaging]"
          bash desktop/scripts/build-sidecar.sh
          bash desktop/scripts/smoke-sidecar.sh

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ matrix.arch }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.arch }}-cargo-

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      - name: Remove any stale bundle output (warm cache may restore old bundles)
        run: rm -rf desktop/src-tauri/target/release/bundle

      - name: Build Tauri bundles
        working-directory: desktop
        env:
          # Ubicloud runners are full VMs (FUSE works), but keep EXTRACT_AND_RUN
          # as a belt-and-suspenders fallback. NO_STRIP avoids a common silent
          # linuxdeploy strip failure. --verbose surfaces linuxdeploy errors.
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "true"
        run: |
          # AppImage's linuxdeploy scans the bundled PyInstaller sidecar and tries
          # to resolve its vendored libs (auditwheel-hashed names like
          # libwebp-<hash>.so) — but after linuxdeploy copies a Pillow .so out of
          # the bundle, its $ORIGIN runpath no longer points at the sibling vendored
          # lib, so resolution fails. Expose every dir that holds a bundled .so via
          # LD_LIBRARY_PATH so linuxdeploy can find and deploy them.
          SIDE="$GITHUB_WORKSPACE/desktop/src-tauri/resources/herdeck-deckapp"
          EXTRA="$(find "$SIDE" -name '*.so*' -printf '%h\n' | sort -u | paste -sd: -)"
          export LD_LIBRARY_PATH="${EXTRA}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
          npm run tauri -- build --verbose

      - name: Verify all three Linux bundle formats were produced
        working-directory: desktop/src-tauri/target/release/bundle
        run: |
          set -euo pipefail
          shopt -s nullglob
          fail=0
          for kind in "appimage/*.AppImage" "deb/*.deb" "rpm/*.rpm"; do
            files=( $kind )
            if [ ${#files[@]} -eq 0 ]; then
              echo "FAIL: no file matched $kind"; fail=1
            else
              echo "OK: $kind -> ${files[*]}"
            fi
          done
          [ "$fail" -eq 0 ] || { echo "Missing one or more bundle formats"; exit 1; }

      - name: Inspect rpm runtime Requires (diagnostic — appindicator best-effort)
        working-directory: desktop/src-tauri/target/release/bundle/rpm
        run: |
          shopt -s nullglob
          for f in *.rpm; do
            echo "=== Requires of $f ==="
            rpm -qpR "$f"
          done

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v4
        with:
          name: herdeck-linux-${{ matrix.arch }}
          path: |
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-linux
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: herdeck-linux-*
          path: dist
          merge-multiple: true

      - name: Publish immutable tag release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes
